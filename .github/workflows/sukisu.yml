name: Build NP2 Kernel

permissions:
    contents: write
    actions: write

on:
    worflow_dispatch:
        inputs:
            kernel_repo:
                description: 'Kernel source repo'
                required: false
                type: string
                default: https://github.com/ShaptakNaskar/android_kernel_nothing_sm8475.git
            kernel_branch:
                description: 'Kernel branch'
                required: false
                type: string
                default: 'SukiSU'
            kernel_defconfig:
                description: 'Defconfig (relative to arch/arm64/configs/)'
                required: false
                type: string
                default: 'gki_defconfig'
            extra_configs:
                required: false
                type: string
                default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config vendor/debugfs.config'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                include:
                  - variant: SukiSU
                    susfs: true

        steps:
            - name:  Checkout repo
              uses: actions/checkout@v4

            - name: Install depen
                run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    build-essential bc bison flex libelf-dev libssl-dev \
                    lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu
            - name: Clone sources
              run: |
                # Kernel
                git clone --depth=1 -b